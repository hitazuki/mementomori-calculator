name: Sync Image Assets

on:
  workflow_run:
    workflows: ["Sync Master Data"]
    types: [completed]
  workflow_dispatch:

jobs:
  sync-assets:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: 'mmt-calculator'
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            9.0.x

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Sync image assets
        working-directory: mmt-calculator
        env:
          SYNC_ASSETS_GRACEFUL_FAILURE: '1'
        run: npm run sync:assets

      - name: Check for changes
        id: git-check
        working-directory: mmt-calculator
        run: |
          git add public/images/ public/data/asset_version.txt
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No image asset changes detected."
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Image asset changes detected."
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        working-directory: mmt-calculator
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(assets): auto sync image assets"
          git push
